name: Publish Packages

on:
  push:
    branches: [main]
    paths:
      - 'packages/chat/**'
      - 'packages/cli/**'
      - 'packages/create-app/**'

jobs:
  detect:
    runs-on: ubuntu-latest
    outputs:
      chat: ${{ steps.changes.outputs.chat }}
      cli: ${{ steps.changes.outputs.cli }}
      create-app: ${{ steps.changes.outputs.create-app }}
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 2
      - id: changes
        run: |
          CHANGED=$(git diff --name-only HEAD~1 HEAD)
          echo "chat=$(echo "$CHANGED" | grep -q '^packages/chat/' && echo true || echo false)" >> $GITHUB_OUTPUT
          echo "cli=$(echo "$CHANGED" | grep -q '^packages/cli/' && echo true || echo false)" >> $GITHUB_OUTPUT
          echo "create-app=$(echo "$CHANGED" | grep -q '^packages/create-app/' && echo true || echo false)" >> $GITHUB_OUTPUT

  publish-chat:
    needs: detect
    if: needs.detect.outputs.chat == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
          registry-url: https://registry.npmjs.org
      - run: pnpm install --frozen-lockfile
      - name: Build
        run: pnpm turbo build --filter=@polpo-ai/chat
      - name: Publish (skip if version exists)
        run: pnpm --filter @polpo-ai/chat publish --no-git-checks --access public || echo "Version already published, skipping."
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

  publish-cli:
    needs: detect
    if: needs.detect.outputs.cli == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          registry-url: https://registry.npmjs.org
      - name: Publish (skip if version exists)
        run: cd packages/cli && npm publish --access public || echo "Version already published, skipping."
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

  publish-create-app:
    needs: detect
    if: needs.detect.outputs.create-app == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          registry-url: https://registry.npmjs.org
      - name: Publish (skip if version exists)
        run: cd packages/create-app && npm publish --access public || echo "Version already published, skipping."
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
